<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Demon Slayer Hub | Cadastro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/img/favicon-16x16.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/cadastro.css">
</head>

<body>
    <a href="/"><img src="/img/voltar.png" id="voltar" title="Voltar" alt=""></a>
    <section id="cadastro">
        <h1>Cadastro de Usuário</h1>
        <form id="formCadastro">
            <div class="dados">
                <label>Usuário</label>
                <input type="text" required>
            </div>

            <div class="dados">
                <label>E-mail</label>
                <input type="email" placeholder="exemplo@email.com" required>
            </div>

            <div class="dados">
                <label>Senha</label>
                <input type="password" required>
            </div>

            <div class="dados">
                <label>Confirmar Senha</label>
                <input type="password" required>
            </div>

            <button type="submit" id="botao" name="cadastrar">Cadastrar</button>
        </form>
    </section>

</body>

</html>
